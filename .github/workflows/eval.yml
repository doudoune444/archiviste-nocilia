name: RAG Eval

on:
  pull_request:
    paths:
      - "workers/src/archiviste_workers/services/**"
      - "workers/src/archiviste_workers/routers/retrieve.py"
      - "workers/src/archiviste_workers/routers/generate.py"
      - "specs/golden_qa.jsonl"
      - "eval/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ragas:
    name: ragas vs baseline
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: archiviste
        ports: ["5432:5432"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install uv

      - name: sync workers
        working-directory: workers
        run: uv sync --all-extras

      - name: seed minimal corpus
        run: uv run python eval/seed_test_corpus.py

      - name: restore HF Hub cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-hf-hub-${{ hashFiles('workers/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-hf-hub-

      - name: start workers
        working-directory: workers
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/archiviste
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run uvicorn archiviste_workers.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid
          for i in $(seq 1 300); do
            if curl -sf http://localhost:8000/healthz; then
              echo "workers up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "workers did not become healthy within 300 s"
          echo "--- uvicorn log ---"
          cat /tmp/uvicorn.log || true
          echo "--- process status ---"
          ps -p "$(cat /tmp/uvicorn.pid)" || echo "uvicorn process exited"
          exit 1

      - name: run ragas
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run python eval/ragas_runner.py \
            --set specs/golden_qa.jsonl \
            --baseline eval/baseline.json \
            --output eval/runs/pr-${{ github.event.pull_request.number }}.json

      - name: comment results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = `eval/runs/pr-${{ github.event.pull_request.number }}.json`;
            if (!fs.existsSync(path)) return;
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            const body = `## RAG Eval results\n\n\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
