name: Bug report
description: Report a defect in gateway, workers, infra, or docs
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.
        **For security issues, do NOT use this template.** See [SECURITY.md](../../SECURITY.md).

  - type: input
    id: component
    attributes:
      label: Component
      description: gateway / workers / infra / docs / specs / tooling
      placeholder: gateway
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      description: Output of `git rev-parse HEAD` or release tag
      placeholder: v0.1.0 or abc1234
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Numbered list. Include curl commands, queries, inputs.
      placeholder: |
        1. Run `docker compose up -d`
        2. POST to /v1/retrieve with body { "query": "..." }
        3. Observe 500 response
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant logs. Redact any secrets or PII first.
      render: shell

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: macOS 14 / Docker 25 / Postgres 16
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I redacted any secrets or personal data from this report
          required: true
        - label: This is NOT a security issue (those go through SECURITY.md)
          required: true
