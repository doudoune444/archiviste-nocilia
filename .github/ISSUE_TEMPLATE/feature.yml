name: Feature request
description: Suggest a new feature or enhancement
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Note : this project follows a spec-first workflow.
        Approved features become tickets in `specs/acceptance/<ID>.md` authored via `/spec`.

  - type: input
    id: scope
    attributes:
      label: Scope
      description: gateway / workers / infra / observability / eval / docs / agentic-workflow
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this solve? Whose workflow improves?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: High-level approach. Don't write the spec — that comes later via `/spec`.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why they were rejected

  - type: textarea
    id: impact
    attributes:
      label: Impact assessment
      description: |
        - New dependencies?
        - Schema migration needed?
        - Threat model changes?
        - Breaking API change?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "low (nice to have)"
        - "medium (planned next quarter)"
        - "high (blocking my use case)"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and discussions
          required: true
        - label: This aligns with project scope (RAG public web app, Gateway Rust + Workers Python)
          required: true
