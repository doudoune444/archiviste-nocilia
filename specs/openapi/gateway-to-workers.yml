openapi: 3.1.0
info:
  title: Archiviste Nocilia — Gateway to Workers contract
  version: 0.1.0
  description: |
    Internal contract between the Rust gateway and the Python workers.
    Source of truth for both sides. Tested via schemathesis.

servers:
  - url: http://workers:8000
    description: Workers in docker-compose
  - url: http://localhost:8000
    description: Workers running locally

paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Worker is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /v1/retrieve:
    post:
      summary: Retrieve top-k chunks for a query (RET-001)
      description: |
        Embed the query with bge-m3, run an ACL-filtered cosine top-K SQL against
        `chunks`, return the ordered chunks with deterministic tie-break.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrieveRequest'
      responses:
        '200':
          description: Top-k chunks (may be empty)
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/RetrieveResponse'
        '400':
          description: Invalid request body
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/RetrieveError'
        '503':
          description: Embedder or database unavailable
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/RetrieveError'

  /v1/generate:
    post:
      summary: Generate an answer from a query and retrieved contexts
      parameters:
        - name: X-User-Id
          in: header
          required: true
          description: Caller user_id (anonymous UUIDv5 or member/author UUID). Gateway-set per SEC-001 AC-14.
          schema:
            type: string
            format: uuid
        - name: X-User-Tier
          in: header
          required: true
          description: Caller tier. Gateway-set per SEC-001 AC-14.
          schema:
            type: string
            enum: [anonymous, members, author_only]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Generated answer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

components:
  schemas:
    Health:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string

    RetrieveRequest:
      type: object
      additionalProperties: true
      required: [query, user_tier]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            Free-text query, non-empty after strip, at most 4096 UTF-8 bytes.
        top_k:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
          description: Number of chunks to return. Defaults to 5 if absent or null.
          nullable: true
        user_tier:
          type: string
          enum: [anonymous, members, author_only]
          description: ACL scope mapping directly to `documents.access_tier`.

    RetrieveResponse:
      type: object
      required: [chunks, embedding_ms, search_ms]
      properties:
        chunks:
          type: array
          items:
            $ref: '#/components/schemas/RetrievedChunk'
        embedding_ms:
          type: integer
          minimum: 0
        search_ms:
          type: integer
          minimum: 0

    RetrievedChunk:
      type: object
      required: [chunk_id, document_id, source_path, ord, text, score, access_tier]
      properties:
        chunk_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        source_path:
          type: string
        ord:
          type: integer
          minimum: 0
        text:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 1
        access_tier:
          type: string
          enum: [public, members, author_only]
          description: |
            ACL tier of the source document (mirror of `documents.access_tier`).
            Consumed by GEN-005 post-retrieval filter for Mode 4 mystery routing.
            Added in GEN-005 (drift D-2: replaces SQL-side `WHERE access_tier = ANY($2)` filter from RET-001).

    RetrieveError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum:
            - invalid_request
            - invalid_query
            - invalid_top_k
            - invalid_user_tier
            - embedder_unavailable
            - database_unavailable

    GenerateRequest:
      type: object
      required: [query, contexts, conversation_id]
      properties:
        query:
          type: string
        contexts:
          type: array
          items:
            # RET-001 review MED: point at RetrievedChunk (was `Chunk`, removed by RET-001). GEN-001 will redefine.
            $ref: '#/components/schemas/RetrievedChunk'
        conversation_id:
          type: string
          format: uuid

    GenerateResponse:
      type: object
      required: [answer, model, cost_eur, lore_gap_detected]
      properties:
        answer:
          type: string
        model:
          type: string
        cost_eur:
          type: number
          minimum: 0
        lore_gap_detected:
          type: boolean
        ticket_id:
          type: string
          format: uuid
          nullable: true

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas_errors:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
