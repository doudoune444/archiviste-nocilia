name: Deploy

on:
  push:
    branches: [main]

# Serialize deploys: concurrent merges to main otherwise race on update-traffic,
# letting an older run's promote finish last and pin traffic to a stale revision.
# Queue (cancel-in-progress: false) instead of cancel — aborting mid-promote/migrate
# could leave traffic split or the DB schema half-applied.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: build → push → canary → migrate → smoke → promote
    runs-on: ubuntu-latest
    env:
      REGION: europe-west9
      GATEWAY_SERVICE: archiviste-gateway
      WORKERS_SERVICE: archiviste-workers
      FRONTEND_SERVICE: archiviste-frontend

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # AC-11: WIF auth — zero JSON key secrets, OIDC only.
      - name: authenticate to GCP via WIF
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # buildx with docker-container driver — required for cache-to type=gha
      # (default docker driver rejects "Cache export is not supported").
      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      # AC-12 step 1-2: build and push images tagged with git SHA.
      - name: build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: gateway
          file: infra/docker/gateway.Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archiviste/gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: build and push workers
        uses: docker/build-push-action@v6
        with:
          context: workers
          file: infra/docker/workers.Dockerfile
          push: true
          # :latest tracks current main so the ingest Cloud Run Job (OPS-005), which pins
          # workers:latest, picks up each deploy on its next execution. :sha stays the
          # immutable ref the canary/promote steps deploy to the service.
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archiviste/workers:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archiviste/workers:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # OBS-008: build and push eval runner image on every merge to main.
      # Reuses repo archiviste (AC-8: no new Terraform resource). Placed among the
      # build steps; a build/push failure here fails the job (AC-7) and, being upstream
      # of the canary/promote steps, will gate the gateway/workers deploy too.
      - name: build and push eval
        uses: docker/build-push-action@v6
        with:
          context: eval
          file: infra/docker/eval.Dockerfile
          push: true
          # :sha = immutable ref; :latest = moving pointer for OBS-009 Cloud Run Job.
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archiviste/eval:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archiviste/eval:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # PLATFORM-004: build and push frontend image on every merge to main.
      # context=frontend, file=infra/docker/frontend.Dockerfile.
      # :sha = immutable ref the canary/promote steps deploy. :latest = the
      # placeholder cloud_run.tf creates the archiviste-frontend service from
      # (terraform apply needs :latest to exist to bootstrap the service before
      # the canary step — which uses --no-traffic — can target it).
      - name: build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: infra/docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archiviste/frontend:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archiviste/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # AC-12 step 3: deploy canary revisions with --no-traffic.
      - name: deploy gateway canary (no traffic)
        id: deploy_gateway
        run: |
          gcloud run deploy ${{ env.GATEWAY_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archiviste/gateway:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --no-traffic \
            --tag canary \
            --quiet
          # AC-12 step 3: resolve canary revision via latestCreatedRevisionName (tag-based
          # substring filter on metadata.name is unreliable — Cloud Run names are random slugs).
          echo "revision=$(gcloud run services describe ${{ env.GATEWAY_SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.latestCreatedRevisionName)')" >> "$GITHUB_OUTPUT"

      - name: deploy workers canary (no traffic)
        id: deploy_workers
        run: |
          gcloud run deploy ${{ env.WORKERS_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archiviste/workers:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --no-traffic \
            --tag canary \
            --quiet
          # AC-12 step 3: same canonical resolution for workers.
          echo "revision=$(gcloud run services describe ${{ env.WORKERS_SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.latestCreatedRevisionName)')" >> "$GITHUB_OUTPUT"

      # PLATFORM-004: deploy frontend canary with --no-traffic.
      - name: deploy frontend canary (no traffic)
        id: deploy_frontend
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archiviste/frontend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --no-traffic \
            --tag canary \
            --quiet
          echo "revision=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.latestCreatedRevisionName)')" >> "$GITHUB_OUTPUT"

      # OPS-003: apply pending migrations to Cloud SQL via cloud-sql-proxy v2.
      # Runs after both canary revisions are deployed (schema ready before traffic),
      # before promote (migration failure → rollback, never promote broken schema).
      # gha-deploy impersonates runtime SA (tokenCreator grant in iam.tf) so the proxy
      # authenticates as archiviste-runtime which owns the schema (roles/cloudsql.instanceUser).
      # DB username = SA email with ".gserviceaccount.com" stripped, "@" → "%40" (RFC 3986).
      - name: apply migrations to Cloud SQL (impersonate runtime SA)
        id: migrate
        run: |
          # install cloud-sql-proxy v2
          curl -fsSL -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          ./cloud-sql-proxy --auto-iam-authn \
            --impersonate-service-account=archiviste-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --port 5432 \
            ${{ secrets.GCP_PROJECT_ID }}:${{ env.REGION }}:archiviste-db &
          PROXY_PID=$!
          # wait until the proxy accepts connections (timeout ~30s)
          for _ in $(seq 1 30); do pg_isready -h 127.0.0.1 -p 5432 && break; sleep 1; done
          export DATABASE_URL="postgresql://archiviste-runtime%40${{ secrets.GCP_PROJECT_ID }}.iam@127.0.0.1:5432/archiviste?sslmode=disable"
          MIGRATIONS_DIR=./migrations bash migrations/run.sh
          STATUS=$?
          kill $PROXY_PID || true
          exit $STATUS

      # OPS-003: assert all canary revisions reached Ready=True before promote.
      # Uses gcloud JSON output + jq for robust condition parsing (avoids fragile
      # --format filter expression). Fail here → rollback, never promote broken revision.
      - name: assert canary revisions are Ready
        id: canary_ready
        run: |
          for pair in \
            "${{ env.GATEWAY_SERVICE }}=${{ steps.deploy_gateway.outputs.revision }}" \
            "${{ env.WORKERS_SERVICE }}=${{ steps.deploy_workers.outputs.revision }}" \
            "${{ env.FRONTEND_SERVICE }}=${{ steps.deploy_frontend.outputs.revision }}"; do
            svc="${pair%%=*}"; rev="${pair##*=}"
            ready=$(gcloud run revisions describe "$rev" --region="${{ env.REGION }}" \
              --format=json \
              | jq -r '.status.conditions[]? | select(.type=="Ready") | .status')
            echo "$svc revision $rev Ready=$ready"
            [ "$ready" = "True" ] || { echo "::error::$svc canary $rev not Ready (status=$ready)"; exit 1; }
          done

      # Promote workers to 100% BEFORE the gateway smoke. The gateway liveness
      # aggregate probes WORKERS_URL/health (cloud_run.tf), and WORKERS_URL routes
      # to the *serving* workers revision — not the no-traffic canary. Smoking the
      # gateway while the previous workers revision still serves means any deploy that
      # adds a workers route (e.g. the /health alias) probes a revision that lacks it,
      # so the aggregate degrades and smoke fails — an unbreakable bootstrap deadlock.
      # Workers readiness is already gated by `assert canary revisions are Ready` + the
      # /readyz startup probe, and a workers regression is rolled back below on smoke
      # failure, so promoting it ahead of the gateway smoke is safe.
      - name: promote workers to 100%
        id: promote_workers
        if: success()
        run: |
          gcloud run services update-traffic ${{ env.WORKERS_SERVICE }} \
            --to-revisions=${{ steps.deploy_workers.outputs.revision }}=100 \
            --region ${{ env.REGION }} \
            --quiet

      # AC-12 step 4: smoke test via canary revision URL (bypasses Cloudflare DNS race).
      # MUST parse JSON .status — gateway /health returns HTTP 200 even when workers is
      # degraded (cf gateway/src/handlers/health.rs); HTTP 2xx alone is not sufficient.
      # Workers ingress=internal: not directly curl-able from GHA runner — gateway /health
      # exercises workers reachability via internal service call, covering both services.
      # Probe /health, not /healthz: Cloud Run's public frontend reserves the literal
      # /healthz path and 404s it before it reaches the container. /health is an alias.
      - name: smoke test canary gateway
        id: smoke
        run: |
          # One describe yields both URLs we need:
          #  - CANARY_URL: the tag-routed URL we actually curl (status.traffic[] where
          #    tag==canary). Revisions expose no status.url, so resolve via the tag.
          #  - BASE_URL: the service's canonical *.run.app URL (status.url), used as the
          #    token audience below.
          SERVICE_JSON=$(gcloud run services describe ${{ env.GATEWAY_SERVICE }} \
            --region=${{ env.REGION }} \
            --format=json)
          CANARY_URL=$(echo "${SERVICE_JSON}" | jq -r '.status.traffic[]? | select(.tag=="canary") | .url')
          BASE_URL=$(echo "${SERVICE_JSON}" | jq -r '.status.url')
          echo "Smoke URL: ${CANARY_URL} (audience: ${BASE_URL})"
          [ -n "${CANARY_URL}" ] || { echo "::error::canary tag URL not found on ${{ env.GATEWAY_SERVICE }}"; exit 1; }
          [ -n "${BASE_URL}" ] || { echo "::error::base service URL not found on ${{ env.GATEWAY_SERVICE }}"; exit 1; }

          # Retry with backoff: the freshly-minted canary tag URL needs a few seconds to
          # route, and the no-traffic revision cold-starts on first hit (gateway boot +
          # internal workers call). Capture HTTP code + body explicitly — no `-f`, so a
          # non-2xx surfaces its status instead of collapsing to an opaque empty-body exit.
          # PLATFORM-004: gateway_runtime_invoker limits invoker to the runtime SA.
          # The GHA runner authenticates as gha-deploy SA (via WIF); to reach the
          # SA-gated canary URL it must present an identity token Cloud Run accepts:
          #  - Under WIF the active principal is a federated identity, not a key-based
          #    service account, so `print-identity-token --audiences` rejects it
          #    ("Invalid account type"). Mint by impersonating the deploy SA instead.
          #  - --include-email adds the email claim Cloud Run's invoker check requires.
          #  - The aud claim MUST be the base service URL, NOT the canary tag URL. Cloud
          #    Run validates aud against the canonical service URL even when the request
          #    targets a tag-routed hostname; using the tag URL as audience returns 401.
          ID_TOKEN=$(gcloud auth print-identity-token \
            --impersonate-service-account="${{ secrets.GCP_SA_EMAIL }}" \
            --audiences="${BASE_URL}" \
            --include-email)
          for attempt in $(seq 1 6); do
            HTTP_CODE=$(curl -s -o /tmp/health.json -w '%{http_code}' \
              -H "Authorization: Bearer ${ID_TOKEN}" \
              --max-time 30 "${CANARY_URL}/health" || echo "000")
            echo "Attempt ${attempt}/6: HTTP ${HTTP_CODE}"
            if [ "${HTTP_CODE}" = "200" ] && jq -e '.status == "ok"' /tmp/health.json; then
              echo "Smoke passed."
              exit 0
            fi
            echo "Body: $(cat /tmp/health.json 2>/dev/null)"
            sleep 10
          done
          echo "::error::canary smoke failed after 6 attempts (last HTTP=${HTTP_CODE})"
          exit 1

      # AC-12 step 5: promote gateway 100% on smoke success. Workers was already
      # promoted before the smoke (see above); only the gateway and frontend remain.
      - name: promote gateway to 100%
        if: success()
        run: |
          gcloud run services update-traffic ${{ env.GATEWAY_SERVICE }} \
            --to-revisions=${{ steps.deploy_gateway.outputs.revision }}=100 \
            --region ${{ env.REGION }} \
            --quiet

      # PLATFORM-004: promote frontend after the gateway smoke passes.
      # Frontend canary is promoted last — it depends on the gateway being healthy.
      - name: promote frontend to 100%
        if: success()
        run: |
          gcloud run services update-traffic ${{ env.FRONTEND_SERVICE }} \
            --to-revisions=${{ steps.deploy_frontend.outputs.revision }}=100 \
            --region ${{ env.REGION }} \
            --quiet

      # AC-12 step 6: rollback on smoke failure OR migrate/canary_ready failure.
      # Resolves the N-1 revision dynamically — gcloud has no "PREVIOUS" sentinel.
      # Spec line 38/71: dynamic resolution via revisions list + exit 1 mandatory.
      - name: rollback gateway on smoke failure
        if: failure() && (steps.smoke.conclusion == 'failure' || steps.migrate.conclusion == 'failure' || steps.canary_ready.conclusion == 'failure')
        run: |
          PREVIOUS=$(gcloud run revisions list \
            --service=${{ env.GATEWAY_SERVICE }} \
            --region=${{ env.REGION }} \
            --sort-by=~metadata.creationTimestamp \
            --limit=2 \
            --format='value(metadata.name)' | tail -1)
          echo "Rolling back gateway to revision: ${PREVIOUS}"
          gcloud run services update-traffic ${{ env.GATEWAY_SERVICE }} \
            --to-revisions="${PREVIOUS}=100" \
            --region ${{ env.REGION }} \
            --quiet
          exit 1

      - name: rollback workers on smoke failure
        if: failure() && (steps.smoke.conclusion == 'failure' || steps.migrate.conclusion == 'failure' || steps.canary_ready.conclusion == 'failure')
        run: |
          PREVIOUS=$(gcloud run revisions list \
            --service=${{ env.WORKERS_SERVICE }} \
            --region=${{ env.REGION }} \
            --sort-by=~metadata.creationTimestamp \
            --limit=2 \
            --format='value(metadata.name)' | tail -1)
          echo "Rolling back workers to revision: ${PREVIOUS}"
          gcloud run services update-traffic ${{ env.WORKERS_SERVICE }} \
            --to-revisions="${PREVIOUS}=100" \
            --region ${{ env.REGION }} \
            --quiet
          exit 1

      # PLATFORM-004: rollback frontend in lock-step with gateway/workers.
      - name: rollback frontend on smoke failure
        if: failure() && (steps.smoke.conclusion == 'failure' || steps.migrate.conclusion == 'failure' || steps.canary_ready.conclusion == 'failure')
        run: |
          PREVIOUS=$(gcloud run revisions list \
            --service=${{ env.FRONTEND_SERVICE }} \
            --region=${{ env.REGION }} \
            --sort-by=~metadata.creationTimestamp \
            --limit=2 \
            --format='value(metadata.name)' | tail -1)
          echo "Rolling back frontend to revision: ${PREVIOUS}"
          gcloud run services update-traffic ${{ env.FRONTEND_SERVICE }} \
            --to-revisions="${PREVIOUS}=100" \
            --region ${{ env.REGION }} \
            --quiet
          exit 1
