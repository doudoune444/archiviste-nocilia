name: CI

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".claude/**"
      - "CHANGELOG.md"
      - ".gitignore"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint (cross-cutting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check port consistency
        run: bash scripts/check-ports.sh

  gateway:
    name: gateway (rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gateway

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test --all

      - name: build release
        run: cargo build --release

  workers:
    name: workers (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install uv
        run: pip install uv

      - name: sync deps
        run: uv sync --all-extras

      - name: ruff format check
        run: uv run ruff format --check .

      - name: ruff lint
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy src/

      - name: pytest
        run: uv run pytest --cov --cov-report=xml

  contract:
    name: contract (schemathesis)
    runs-on: ubuntu-latest
    needs: [gateway, workers]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: archiviste
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install uv "schemathesis>=4,<5"

      - name: install workers
        working-directory: workers
        run: uv sync --all-extras

      - name: provision pgvector extension (RET-001)
        # Workers lifespan registers the pgvector codec at boot; without the
        # extension the introspection of `public.vector` fails and uvicorn exits.
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d archiviste \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: start workers
        working-directory: workers
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/archiviste
          GCS_BUCKET: archiviste-conversations-ci
          # Skip ADC discovery; .invalid TLD never resolves (RFC 2606) so any
          # accidental GCS call fails closed instead of hitting a real host.
          GCS_EMULATOR_HOST: http://gcs.invalid
          # GEN-001 AC-8: LlmClient.from_env fails fast when LLM_* missing.
          # Schemathesis only hits /healthz so no real provider call happens —
          # placeholders satisfy the boot validation.
          LLM_PROVIDER: mistral
          LLM_MODEL: mistral-small-latest
          LLM_API_KEY: ci-placeholder
        run: |
          uv run uvicorn archiviste_workers.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid
          for i in {1..60}; do
            if curl -sf http://localhost:8000/healthz; then
              echo "workers up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "workers failed to bind :8000 within 60s"
          echo "--- uvicorn log ---"
          cat /tmp/uvicorn.log || true
          echo "--- process status ---"
          ps -p "$(cat /tmp/uvicorn.pid)" || echo "uvicorn process exited"
          exit 1

      - name: schemathesis
        # Scope to endpoints already implemented. Widen include-path as
        # future tickets ship /v1/retrieve, /v1/generate, etc.
        run: |
          schemathesis run specs/openapi/gateway-to-workers.yml \
            --url http://localhost:8000 \
            --include-path-regex '^/healthz$' \
            --checks all \
            --max-examples 30
