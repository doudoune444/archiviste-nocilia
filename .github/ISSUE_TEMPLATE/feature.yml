name: Feature request
description: Suggest a new feature or enhancement
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Approved features are triaged into GitHub Issues.

  - type: input
    id: scope
    attributes:
      label: Scope
      description: gateway / workers / infra / observability / eval / docs / agentic-workflow
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this solve? Whose workflow improves?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: High-level approach. Implementation detail comes later.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why they were rejected

  - type: textarea
    id: impact
    attributes:
      label: Impact assessment
      description: |
        - New dependencies?
        - Schema migration needed?
        - Threat model changes?
        - Breaking API change?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "low (nice to have)"
        - "medium (planned next quarter)"
        - "high (blocking my use case)"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and discussions
          required: true
        - label: This aligns with project scope (RAG public web app, Gateway Rust + Workers Python)
          required: true
