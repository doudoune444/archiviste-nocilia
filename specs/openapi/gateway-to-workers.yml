openapi: 3.1.0
info:
  title: Archiviste Nocilia — Gateway to Workers contract
  version: 0.1.0
  description: |
    Internal contract between the Rust gateway and the Python workers.
    Source of truth for both sides. Tested via schemathesis.

servers:
  - url: http://workers:8000
    description: Workers in docker-compose
  - url: http://localhost:8000
    description: Workers running locally

paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Worker is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /v1/retrieve:
    post:
      summary: Retrieve top-k chunks for a query (RET-001)
      description: |
        Embed the query with bge-m3, run an ACL-filtered cosine top-K SQL against
        `chunks`, return the ordered chunks with deterministic tie-break.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrieveRequest'
      responses:
        '200':
          description: Top-k chunks (may be empty)
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/RetrieveResponse'
        '400':
          description: Invalid request body
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/RetrieveError'
        '503':
          description: Embedder or database unavailable
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/RetrieveError'

  /v1/generate:
    post:
      summary: Generate an answer from a query and retrieved contexts
      parameters:
        - name: X-User-Id
          in: header
          required: true
          description: Caller user_id (anonymous UUIDv5 or member/author UUID). Gateway-set per SEC-001 AC-14.
          schema:
            type: string
            format: uuid
        - name: X-User-Tier
          in: header
          required: true
          description: Caller tier. Gateway-set per SEC-001 AC-14.
          schema:
            type: string
            enum: [anonymous, member, author]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Generated answer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /v1/verify-contradiction:
    post:
      summary: Verify a visitor's contradiction report via a multi-judge vote (CTR-001)
      description: |
        Re-resolve the answer's cited chunks from the trusted store (ACL-filtered by
        caller tier), run three independent refute-biased judges over (claim, sources),
        and on >=2 confirmations raise/increment a lore-gap ticket carrying the claim.
        No new ticket type. Internal; public exposure + edge rate-limit are CTR-002.
      parameters:
        - name: X-User-Id
          in: header
          required: true
          description: Caller user_id. Gateway-set per SEC-001 AC-14.
          schema:
            type: string
            format: uuid
        - name: X-User-Tier
          in: header
          required: true
          description: Caller tier; bounds ACL re-resolution of cited chunks.
          schema:
            type: string
            enum: [anonymous, member, author]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyContradictionRequest'
      responses:
        '200':
          description: Verdict (ticket raised only on >=2 confirmations)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyContradictionResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyContradictionError'

components:
  schemas:
    Health:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string

    RetrieveRequest:
      type: object
      additionalProperties: true
      required: [query, user_tier]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            Free-text query, non-empty after strip, at most 4096 UTF-8 bytes.
        top_k:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
          description: Number of chunks to return. Defaults to 5 if absent or null.
          nullable: true
        user_tier:
          type: string
          enum: [anonymous, members, author_only]
          description: ACL scope mapping directly to `documents.access_tier`.

    RetrieveResponse:
      type: object
      required: [chunks, embedding_ms, search_ms]
      properties:
        chunks:
          type: array
          items:
            $ref: '#/components/schemas/RetrievedChunk'
        embedding_ms:
          type: integer
          minimum: 0
        search_ms:
          type: integer
          minimum: 0

    RetrievedChunk:
      type: object
      required: [chunk_id, document_id, source_path, ord, text, score, access_tier]
      properties:
        chunk_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        source_path:
          type: string
        ord:
          type: integer
          minimum: 0
        text:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 1
        access_tier:
          type: string
          enum: [public, members, author_only]
          description: |
            ACL tier of the source document (mirror of `documents.access_tier`).
            Consumed by GEN-005 post-retrieval filter for Mode 4 mystery routing.
            Added in GEN-005 (drift D-2: replaces SQL-side `WHERE access_tier = ANY($2)` filter from RET-001).

    RetrieveError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum:
            - invalid_request
            - invalid_query
            - invalid_top_k
            - invalid_user_tier
            - embedder_unavailable
            - database_unavailable

    GenerateRequest:
      type: object
      required: [query, contexts, conversation_id]
      properties:
        query:
          type: string
        contexts:
          type: array
          items:
            # RET-001 review MED: point at RetrievedChunk (was `Chunk`, removed by RET-001). GEN-001 will redefine.
            $ref: '#/components/schemas/RetrievedChunk'
        conversation_id:
          type: string
          format: uuid

    GenerateResponse:
      type: object
      required: [answer, citations, mode, conversation_id, request_id, usage, retrieve_ms, llm_ms]
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
        mode:
          type: string
          enum: [canon, off_topic, lore_gap, mystery]
        conversation_id:
          type: string
          format: uuid
        request_id:
          type: string
          format: uuid
        usage:
          $ref: '#/components/schemas/Usage'
        retrieve_ms:
          type: integer
          minimum: 0
        llm_ms:
          type: integer
          minimum: 0

    Usage:
      type: object
      required: [prompt_tokens, completion_tokens]
      properties:
        prompt_tokens:
          type: integer
          minimum: 0
          nullable: true
        completion_tokens:
          type: integer
          minimum: 0
          nullable: true
        cost_eur:
          type: number
          minimum: 0
          nullable: true

    VerifyContradictionRequest:
      type: object
      required: [claim, conversation_id, request_id]
      properties:
        claim:
          type: string
          minLength: 1
          maxLength: 4096
          description: Visitor's asserted contradiction. Stored verbatim as the ticket question on confirmation.
        conversation_id:
          type: string
          format: uuid
          description: Conversation the reported answer belongs to. FK target for the raised ticket.
        citations:
          type: array
          maxItems: 50
          items:
            $ref: '#/components/schemas/Citation'
          description: |
            Optional. The reported answer's cited sources. Source text is re-resolved server-side
            from the trusted chunks store, never trusted from the client.
            When absent or empty, workers embeds the claim and retrieves the top-5 chunks
            (ACL-filtered by caller tier) as the judge's sources (#162 no-citation path).
        request_id:
          type: string
          format: uuid
        force:
          type: boolean
          default: false
          description: |
            Optional. When true, raises a ticket even if the judges did not confirm the
            contradiction (human "send anyway" override, #163). The ticket is tagged
            judges_not_passed=true on the board to distinguish it from judge-confirmed
            tickets. Cosine dedup still applies (anti-spam).

    Citation:
      type: object
      required: [source_path, chunk_ords]
      properties:
        source_path:
          type: string
        chunk_ords:
          type: array
          maxItems: 200
          items:
            type: integer
            minimum: 0

    VerifyContradictionResponse:
      type: object
      required: [verdict, reason, ticket_action]
      properties:
        verdict:
          type: string
          enum: [present, absent, contradiction, unclear]
          description: |
            Four-way panel verdict (#162). present = claim supported by canon;
            absent = information not present in sources (lore-gap);
            contradiction = sources directly disagree;
            unclear = panel could not decide.
        reason:
          type: string
          description: |
            Synthesized single-sentence reason for the visitor/board.
            References only verdict and source_path identifiers — never raw chunk body text.
            Per-judge reasons are logged server-side only.
        ticket_action:
          type: string
          enum: [created, incremented, skipped_error, not_raised]
          description: |
            not_raised when verdict is present or no verdict reaches >=2 votes;
            skipped_error when a ticket should be raised but the write failed (fail-soft).
        ticket_id:
          type: string
          format: uuid
          nullable: true

    VerifyContradictionError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum:
            - invalid_request
            - invalid_claim
            - invalid_conversation_id
            - invalid_citations

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas_errors:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
