services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: archiviste
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  workers:
    build:
      context: ./workers
      dockerfile: ../infra/docker/workers.Dockerfile
    environment:
      ENV: docker
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/archiviste
      GCS_BUCKET_CONVERSATIONS: ${GCS_BUCKET_CONVERSATIONS:-archiviste-conversations-dev}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./gateway
      dockerfile: ../infra/docker/gateway.Dockerfile
    environment:
      RUST_LOG: info,archiviste_gateway=debug
      BIND_ADDR: 0.0.0.0:8080
      WORKERS_URL: http://workers:8000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/archiviste
    ports:
      - "8080:8080"
    depends_on:
      workers:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
