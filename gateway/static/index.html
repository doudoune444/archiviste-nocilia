<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archiviste de Nocilia</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <nav>
    <a href="/">Chat</a>
    <a href="/observability">Observabilité</a>
  </nav>
  <main>
    <header>
      <h1>Archiviste de Nocilia</h1>
      <button id="new-conversation-btn" type="button">Nouvelle conversation</button>
    </header>
    <section id="history" aria-label="Conversations précédentes" hidden>
      <h2 class="history-title">Conversations précédentes</h2>
      <ul id="history-list"></ul>
    </section>
    <section id="conversation" aria-live="polite" aria-label="Conversation"></section>
    <form id="chat-form" autocomplete="off">
      <label for="query-input" class="visually-hidden">Votre question</label>
      <input
        id="query-input"
        type="text"
        name="query"
        placeholder="Posez votre question à l'Archiviste…"
        required
        maxlength="4096"
      >
      <button id="send-btn" type="submit">Envoyer</button>
    </form>
    <div id="signaler-panel">
      <button id="signaler-toggle-btn" type="button" class="signaler-toggle-btn" aria-expanded="false">
        Signaler une incohérence
      </button>
      <div id="signaler-form" hidden>
        <label for="signaler-claim" class="visually-hidden">Décrivez l'incohérence</label>
        <textarea
          id="signaler-claim"
          class="report-claim"
          placeholder="Décrivez l'incohérence constatée…"
          maxlength="4096"
          rows="3"
        ></textarea>
        <div class="signaler-actions">
          <button id="signaler-submit-btn" type="button" class="report-submit-btn">
            Envoyer le signalement
          </button>
        </div>
        <p id="signaler-feedback" class="report-feedback" hidden></p>
        <div id="signaler-second-row" class="signaler-second-row" hidden>
          <button id="signaler-send-anyway-btn" type="button" class="report-submit-btn">
            Envoyer quand même
          </button>
          <button id="signaler-cancel-btn" type="button" class="signaler-cancel-btn">
            Annuler
          </button>
        </div>
      </div>
    </div>
  </main>
  <script src="/assets/app.js" defer></script>
</body>
</html>
