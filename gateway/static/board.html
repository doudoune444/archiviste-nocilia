<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tableau lore-gap public — Archiviste de Nocilia</title>
  <link rel="stylesheet" href="/assets/board.css">
</head>
<body>
  <main>
    <header>
      <h1>Questions lore sans réponse</h1>
      <p>Tableau public des tickets ouverts.</p>
    </header>
    <div id="board-error" role="alert" hidden></div>
    <table id="board-table">
      <thead>
        <tr>
          <th scope="col">Priorité</th>
          <th scope="col">Catégorie</th>
          <th scope="col">Question</th>
          <th scope="col">Créé le</th>
          <th scope="col">Confirmation</th>
        </tr>
      </thead>
      <tbody id="board-tbody"></tbody>
    </table>
    <div id="board-load-more-container"></div>
  </main>
  <script src="/assets/board.js" defer></script>
</body>
</html>
