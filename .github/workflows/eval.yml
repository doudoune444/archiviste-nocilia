name: RAG Eval

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      baseline:
        description: "Path to baseline file (optional, defaults to eval/baseline.json)"
        required: false
        default: "eval/baseline.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  offline:
    name: eval offline (gate B no-regression)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: archiviste
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: baseline-skip-check
        id: baseline_skip
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          COMMIT_MSG=$(git show -s --format=%s "$HEAD_SHA")
          # Use merge-base to inspect full PR diff, not just the last commit.
          # This prevents hiding malicious commits behind a final baseline-bump.
          MERGE_BASE=$(git merge-base origin/main "$HEAD_SHA" || git rev-parse "${HEAD_SHA}^")
          CHANGED_FILES=$(git diff --name-only "$MERGE_BASE" "$HEAD_SHA" || echo "")
          echo "commit_msg=$COMMIT_MSG"
          echo "changed_files=$CHANGED_FILES"
          if echo "$COMMIT_MSG" | grep -qi "^chore(eval): bump baseline$" && \
             [ "$CHANGED_FILES" = "eval/baseline.json" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Gate B skipped: baseline bump commit (full PR diff = eval/baseline.json only)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install uv
        run: pip install uv

      - name: sync workers deps
        working-directory: workers
        run: uv sync --all-extras

      - name: sync eval deps
        working-directory: eval
        run: uv sync --all-extras

      - name: apply migrations
        env:
          PGPASSWORD: postgres
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/archiviste
        run: |
          psql -h localhost -U postgres -d archiviste \
            -c "CREATE EXTENSION IF NOT EXISTS vector;" \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          MIGRATIONS_DIR=migrations bash migrations/run.sh

      - name: seed minimal corpus
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/archiviste
        run: uv run python eval/seed_test_corpus.py

      - name: start workers
        working-directory: workers
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/archiviste
          GCS_BUCKET: archiviste-conversations-ci
          GCS_EMULATOR_HOST: http://gcs.invalid
          # Offline eval only calls /v1/retrieve — no real LLM call happens.
          # Placeholders satisfy LlmClient.from_env fail-fast validation at boot.
          LLM_PROVIDER: mistral
          LLM_MODEL: mistral-small-latest
          LLM_API_KEY: ci-placeholder
        run: |
          uv run uvicorn archiviste_workers.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:8000/healthz && echo "workers up after ${i}s" && break
            sleep 1
          done

      - name: run eval offline
        if: steps.baseline_skip.outputs.skip != 'true'
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          uv run python eval/ragas_runner.py \
            --mode offline \
            --set eval/fixtures/ci_smoke_qa.jsonl \
            --baseline eval/baseline.json \
            --output eval/runs/pr.json

      - name: upload eval artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-run-${{ github.event.pull_request.number }}
          path: eval/runs/pr.json
          if-no-files-found: ignore

  live:
    name: eval live (gate A absolute + gate B no-regression)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: archiviste
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install uv
        run: pip install uv

      - name: sync workers deps
        working-directory: workers
        run: uv sync --all-extras

      - name: sync eval deps
        working-directory: eval
        run: uv sync --all-extras

      - name: apply migrations
        env:
          PGPASSWORD: postgres
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/archiviste
        run: |
          psql -h localhost -U postgres -d archiviste \
            -c "CREATE EXTENSION IF NOT EXISTS vector;" \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          MIGRATIONS_DIR=migrations bash migrations/run.sh

      - name: seed minimal corpus
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/archiviste
        run: uv run python eval/seed_test_corpus.py

      - name: start workers
        working-directory: workers
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/archiviste
          GCS_BUCKET: archiviste-conversations-ci
          GCS_EMULATOR_HOST: http://gcs.invalid
          LLM_PROVIDER: mistral
          LLM_MODEL: mistral-small-latest
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          uv run uvicorn archiviste_workers.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:8000/healthz && echo "workers up after ${i}s" && break
            sleep 1
          done

      - name: run eval live
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: mistral
          RAGAS_JUDGE_PROVIDER: openai
          WORKERS_URL: http://localhost:8000
        run: |
          uv run python eval/ragas_runner.py \
            --mode live \
            --set specs/golden_qa.jsonl \
            --baseline ${{ inputs.baseline }} \
            --output eval/runs/live.json

      - name: upload eval artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-run-live
          path: eval/runs/live.json
          if-no-files-found: ignore
