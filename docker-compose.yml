services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: archiviste
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # No host port: confined to the docker network. Debug via `docker compose exec redis redis-cli -a $REDIS_PASSWORD`.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD required}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      # --no-auth-warning silences the deprecation notice; we still authenticate.
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" PING | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required}

  workers:
    build:
      context: ./workers
      dockerfile: ../infra/docker/workers.Dockerfile
    environment:
      ENV: docker
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/archiviste
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/0
      GCS_BUCKET_CONVERSATIONS: ${GCS_BUCKET_CONVERSATIONS:-archiviste-conversations-dev}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./gateway
      dockerfile: ../infra/docker/gateway.Dockerfile
    environment:
      RUST_LOG: info,archiviste_gateway=debug
      BIND_ADDR: 0.0.0.0:8080
      WORKERS_URL: http://workers:8000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/archiviste
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      workers:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tools profile: not started by `docker compose up -d`. Invoke via `make migrate`.
  migrator:
    image: postgres:16
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/archiviste}
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: ["/bin/bash", "/migrations/run.sh"]

volumes:
  postgres-data:
  redis-data:
